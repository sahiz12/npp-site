<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPP | සැබෑ වෙනසකට</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --jvp-red: #ff3e3e; --dark: #0f0f0f; }
        body { margin: 0; font-family: 'Noto Sans Sinhala', sans-serif; background: var(--dark); color: white; }
        .nav { padding: 20px; text-align: center; border-bottom: 2px solid var(--jvp-red); background: rgba(0,0,0,0.9); }
        .hero { height: 25vh; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(to bottom, #222, #0f0f0f); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #1a1a1a; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--jvp-red); transform: translateY(-10px); box-shadow: 0 10px 20px rgba(255, 62, 62, 0.2); }
        .card img { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--jvp-red); object-fit: cover; background: #333; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #111; padding: 40px; border-radius: 30px; border: 1px solid var(--jvp-red); max-width: 450px; width: 90%; text-align: center; }
        .btn { background: var(--jvp-red); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: white; color: var(--jvp-red); }
    </style>
</head>
<body>

<div class="nav"><h2>NPP INTERACTIVE HUB</h2></div>

<div class="hero">
    <h1>පොහොසත් රටක් - ලස්සන ජීවිතයක්</h1>
</div>

<div class="grid">
    <div class="card" onclick="show('akd')">
        <img src="https://www.npp.lk/en/assets/img/team/anura-kumara-dissanayaka.jpg" onerror="this.src='https://via.placeholder.com/150/ff3e3e/ffffff?text=AKD'" alt="AKD">
        <h3>අනුර කුමාර දිසානායක</h3>
        <p>ජාතික ජන බලවේගයේ නායක</p>
    </div>
    <div class="card" onclick="show('rw')">
        <img src="https://upload.wikimedia.org/wikipedia/en/2/23/Patabendi_Don_Nandasiri_Rohana_Wijeweera.jpg" onerror="this.src='https://via.placeholder.com/150/ff3e3e/ffffff?text=RW'" alt="RW">
        <h3>රෝහණ විජේවීර</h3>
        <p>ජ.වි.පෙ නිර්මාතෘ</p>
    </div>
    <div class="card" onclick="show('ts')">
        <img src="https://www.npp.lk/en/assets/img/team/tilvin-silva.jpg" onerror="this.src='https://via.placeholder.com/150/ff3e3e/ffffff?text=TS'" alt="TS">
        <h3>ටිල්වින් සිල්වා</h3>
        <p>ප්‍රධාන ලේකම්</p>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <img id="m-img" src="" style="width:160px; height:160px; border-radius:50%; border:4px solid var(--jvp-red); object-fit: cover;">
        <h2 id="m-name"></h2>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <p id="m-desc" style="line-height: 1.6; font-size: 1.1em;"></p>
        <button class="btn" onclick="hide()">වසා දමන්න</button>
    </div>
</div>

<script>
    const data = {
        'akd': { 
            name: 'අනුර කුමාර දිසානායක', 
            desc: 'ජාතික ජන බලවේගයේ නායක සහ වත්මන් ශ්‍රී ලංකා දේශපාලන ගමන්මගෙහි ප්‍රධානතම නියමුවායි.', 
            img: 'https://www.npp.lk/en/assets/img/team/anura-kumara-dissanayaka.jpg' 
        },
        'rw': { 
            name: 'රෝහණ විජේවීර', 
            desc: 'ජනතා විමුක්ති පෙරමුණේ නිර්මාතෘවරයා වන මොහු, මෙරට වාමාංශික දේශපාලනය උඩුයටිකුරු කළ අමරණීය නායකයෙකි.', 
            img: 'https://upload.wikimedia.org/wikipedia/en/2/23/Patabendi_Don_Nandasiri_Rohana_Wijeweera.jpg' 
        },
        'ts': { 
            name: 'ටිල්වින් සිල්වා', 
            desc: 'ජනතා විමුක්ති පෙරමුණේ ප්‍රධාන ලේකම්වරයා ලෙස පක්ෂ යාන්ත්‍රණය ශක්තිමත් කිරීමට වසර ගණනාවක් කැපවී ක්‍රියා කරන නායකයෙකි.', 
            img: 'https://www.npp.lk/en/assets/img/team/tilvin-silva.jpg' 
        }
    };

    function show(id) {
        document.getElementById('m-name').innerText = data[id].name;
        document.getElementById('m-desc').innerText = data[id].desc;
        document.getElementById('m-img').src = data[id].img;
        document.getElementById('modal').style.display = 'flex';
    }
    function hide() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
