<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPP | Interactive Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --jvp-red: #ff3e3e; --dark: #0f0f0f; }
        body { margin: 0; font-family: 'Noto Sans Sinhala', sans-serif; background: var(--dark); color: white; }
        .nav { padding: 20px; text-align: center; border-bottom: 2px solid var(--jvp-red); }
        .hero { height: 30vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)); text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #1a1a1a; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--jvp-red); transform: scale(1.05); }
        .card img { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--jvp-red); object-fit: cover; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 25px; border: 1px solid var(--jvp-red); max-width: 400px; width: 90%; text-align: center; }
        .btn { background: var(--jvp-red); color: white; border: none; padding: 10px 25px; border-radius: 50px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="nav"><h2>NPP INTERACTIVE HUB</h2></div>
    <div class="hero"><h1>පොහොසත් රටක් - ලස්සන ජීවිතයක්</h1></div>
    <div class="grid">
        <div class="card" onclick="show('akd')">
            <img src="https://i.ibb.co/LhbvS8w/akd.jpg" alt="AKD">
            <h3>අනුර කුමාර දිසානායක</h3>
        </div>
        <div class="card" onclick="show('rw')">
            <img src="https://i.ibb.co/f4pY0Gj/rw.jpg" alt="RW">
            <h3>රෝහණ විජේවීර</h3>
        </div>
        <div class="card" onclick="show('ts')">
            <img src="https://i.ibb.co/LpY3JPr/ts.jpg" alt="TS">
            <h3>ටිල්වින් සිල්වා</h3>
        </div>
    </div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <img id="m-img" src="" style="width:150px; height:150px; border-radius:50%; border:4px solid var(--jvp-red);">
            <h2 id="m-name"></h2>
            <p id="m-desc"></p>
            <button class="btn" onclick="hide()">වසා දමන්න</button>
        </div>
    </div>
    <script>
        const data = {
            'akd': { name: 'අනුර කුමාර දිසානායක', desc: 'ජාතික ජන බලවේගයේ නායක සහ වත්මන් දේශපාලන ක්‍රියාවලියේ ප්‍රධාන නියමුවා වේ.', img: 'https://i.ibb.co/LhbvS8w/akd.jpg' },
            'rw': { name: 'රෝහණ විජේවීර', desc: 'ජනතා විමුක්ති පෙරමුණේ නිර්මාතෘවරයායි.', img: 'https://i.ibb.co/f4pY0Gj/rw.jpg' },
            'ts': { name: 'ටිල්වින් සිල්වා', desc: 'ජනතා විමුක්ති පෙරමුණේ ප්‍රධාන ලේකම්වරයා වේ.', img: 'https://i.ibb.co/LpY3JPr/ts.jpg' }
        };
        function show(id) {
            document.getElementById('m-name').innerText = data[id].name;
            document.getElementById('m-desc').innerText = data[id].desc;
            document.getElementById('m-img').src = data[id].img;
            document.getElementById('modal').style.display = 'flex';
        }
        function hide() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
