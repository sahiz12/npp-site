<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anura 2029 | ජාතික මෙහෙවර</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary-red: #e60000; 
            --accent: #ffd700; 
            --bg: #070707; 
            --text: white;
            --glass: rgba(255, 255, 255, 0.03); 
        }

        body.gold-theme {
            --bg: #1a1a00; 
            --text: #ffd700;
            --accent: #ffffff;
            --glass: rgba(255, 215, 0, 0.05);
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Noto Sans Sinhala', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; transition: 0.5s; }

        /* --- Welcome Screen --- */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: flex; cursor: pointer; background: #000; }
        .curtain { width: 50%; height: 100%; transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1); background: linear-gradient(45deg, #400000, #800000); display: flex; align-items: center; position: relative; }
        .left-curtain { justify-content: flex-end; border-right: 1px solid rgba(255, 215, 0, 0.1); }
        .right-curtain { justify-content: flex-start; }
        .opened .left-curtain { transform: translateX(-100%); }
        .opened .right-curtain { transform: translateX(100%); }
        .logo-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 10001; transition: opacity 0.5s; text-align: center; }
        .logo-text { font-size: 3rem; font-weight: bold; color: #ffd700; letter-spacing: 10px; margin: 0; }
        .opened .logo-center { opacity: 0; pointer-events: none; }

        /* --- Navigation --- */
        nav { background: rgba(0,0,0,0.9); padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #111; }
        .theme-toggle { background: var(--glass); border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; cursor: pointer; border-radius: 5px; font-size: 0.75rem; }

        /* --- Hero Section --- */
        .hero { height: 95vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(7,7,7,1)), url('akd.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; }
        .timer-box { display: inline-flex; gap: 40px; margin-top: 40px; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .time-unit { font-size: 2.5rem; font-weight: bold; color: var(--accent); }

        /* --- Sections --- */
        .section { padding: 80px 8%; max-width: 1400px; margin: auto; }

        /* --- Feedback Form Style --- */
        .feedback-form-container { 
            background: rgba(255, 255, 255, 0.02); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            max-width: 800px; 
            margin: 50px auto; 
        }
        .form-title { color: var(--accent); text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #ccc; margin-bottom: 8px; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select { 
            width: 100%; 
            padding: 12px; 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid #333; 
            color: white; 
            border-radius: 8px; 
            font-family: inherit; 
        }
        .form-group textarea { height: 120px; resize: none; }
        .submit-btn { 
            background: var(--primary-red); 
            color: white; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .submit-btn:hover { transform: scale(1.02); background: #b30000; }
    </style>
</head>
<body onload="initApp()">

<div id="welcome-screen" onclick="openSite()">
    <div class="logo-center"><p class="logo-text">NPP</p></div>
    <div class="curtain left-curtain"></div>
    <div class="curtain right-curtain"></div>
</div>

<nav>
    <div style="font-weight: bold; font-size: 1.2rem;">ANURA <span style="color:var(--primary-red)">2029</span></div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Switch to Gold</button>
        <a href="#feedback" style="color:inherit; text-decoration:none; font-size: 0.8rem;">ප්‍රතිපෝෂණ</a>
    </div>
</nav>

<section class="hero">
    <div>
        <h1 style="font-size: 3.5rem; margin: 0;">අනුර කුමාර දිසානායක</h1>
        <div class="timer-box">
            <div><span class="time-unit" id="days">00</span><br><small>දින</small></div>
            <div><span class="time-unit" id="hours">00</span><br><small>පැය</small></div>
            <div><span class="time-unit" id="mins">00</span><br><small>විනාඩි</small></div>
        </div>
    </div>
</section>

<div id="feedback" class="section">
    <div class="feedback-form-container">
        <h2 class="form-title">Feedback Form</h2>
        <p style="text-align: center; color: #aaa; margin-bottom: 30px;">ඔබේ අදහස් අපට වැදගත් වේ.</p>
        
        <!-- සහිරුගේ Formspree URL එක මෙතන තියෙනවා -->
        <form action="https://formspree.io/f/xnjwnyjg" method="POST">
            <div class="form-group">
                <label>NPP එකට අකමැති වීමට හෝ විවේචනය කිරීමට හේතුව:</label>
                <textarea name="rejection_reason" required></textarea>
            </div>

            <div class="form-group">
                <label>අනිත් ආණ්ඩු වලින් කළ හොඳම දේ කුමක්ද?</label>
                <textarea name="other_gov_merits"></textarea>
            </div>

            <div class="form-group">
                <label>අවධානය යොමු කළ යුතු ක්ෂේත්‍රය:</label>
                <select name="target_area">
                    <option value="economy">ආර්ථිකය</option>
                    <option value="it">IT/තාක්ෂණය</option>
                    <option value="education">අධ්‍යාපනය</option>
                    <option value="other">වෙනත්</option>
                </select>
            </div>

            <div class="form-group">
                <label>ඔබේ නම (Optional):</label>
                <input type="text" name="name">
            </div>

            <div class="form-group">
                <label>දිස්ත්‍රික්කය:</label>
                <input type="text" name="district">
            </div>

            <button type="submit" class="submit-btn">අදහස ඉදිරිපත් කරන්න</button>
        </form>
    </div>
</div>

<footer style="text-align: center; padding: 40px; color: #444; font-size: 0.7rem;">
    <p>&copy; 2026 Developed by Sahiru | Target: MORA IT</p>
</footer>

<script>
    function openSite() {
        document.getElementById('welcome-screen').classList.add('opened');
        setTimeout(() => { document.getElementById('welcome-screen').style.display = 'none'; }, 1200);
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        if (body.classList.contains('gold-theme')) {
            body.classList.remove('gold-theme');
            btn.innerText = "Switch to Gold";
            localStorage.setItem('theme', 'dark');
        } else {
            body.classList.add('gold-theme');
            btn.innerText = "Switch to Dark";
            localStorage.setItem('theme', 'gold');
        }
    }

    function initApp() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'gold') {
            document.body.classList.add('gold-theme');
            document.getElementById('themeBtn').innerText = "Switch to Dark";
        }
        updateTimer();
        setInterval(updateTimer, 60000);
    }

    const targetDate = new Date("September 21, 2029 00:00:00").getTime();
    function updateTimer() {
        const now = new Date().getTime();
        const diff = targetDate - now;
        document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    }
</script>

</body>
</html>
