<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anura 2029 | ජාතික මෙහෙවර</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --jvp-red: #e60000; --gold: #ffd700; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Noto Sans Sinhala', sans-serif; background: var(--dark); color: white; overflow-x: hidden; }

        /* --- Welcome Animation --- */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: flex; cursor: pointer; background: #000; }
        .curtain { width: 50%; height: 100%; transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1); background-image: url('npp.jpg'); background-size: 200% 100%; background-repeat: no-repeat; background-color: #800000; }
        .left-curtain { background-position: left center; }
        .right-curtain { background-position: right center; }
        .opened .left-curtain { transform: translateX(-100%); }
        .opened .right-curtain { transform: translateX(100%); }
        .click-hint { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); background: var(--jvp-red); color: white; padding: 12px 30px; border-radius: 50px; font-weight: bold; z-index: 10000; animation: pulse 1.5s infinite; }

        /* --- Header & Nav --- */
        nav { background: rgba(0,0,0,0.8); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); border-bottom: 1px solid var(--jvp-red); }
        .hero { height: 90vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('akd.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; }
        
        /* --- Countdown --- */
        .timer-box { background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,0,0,0.3); display: inline-flex; gap: 20px; margin-top: 30px; }
        .time-unit { font-size: 2rem; font-weight: bold; color: var(--gold); }
        .time-label { display: block; font-size: 0.8rem; color: #ccc; }

        .section { padding: 80px 5%; max-width: 1200px; margin: auto; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 20px; border: 2px solid #333; margin: 40px 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* --- News Widget Styling --- */
        .news-frame { width: 100%; height: 500px; border: 2px solid #222; border-radius: 20px; background: white; }

        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } }
    </style>
</head>
<body onload="setInterval(updateTimer, 60000); updateTimer();">

<div id="welcome-screen" onclick="openSite()">
    <div class="curtain left-curtain"></div>
    <div class="click-hint">පුනරුදයේ ඇරඹුම</div>
    <div class="curtain right-curtain"></div>
</div>

<nav>
    <div style="font-weight: bold; font-size: 1.5rem;">ANURA <span style="color:var(--jvp-red)">2029</span></div>
    <div style="display: flex; gap: 20px;">
        <a href="#video" style="color:white; text-decoration:none; font-weight:bold;">දැක්ම</a>
        <a href="#news" style="color:white; text-decoration:none; font-weight:bold;">පුවත්</a>
    </div>
</nav>

<section class="hero">
    <div>
        <h1 style="font-size: 3.5rem; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);">අනුර කුමාර දිසානායක</h1>
        <p style="font-size: 1.5rem; color: #ddd;">පොහොසත් රටක් - ලස්සන ජීවිතයක්</p>
        
        <div class="timer-box">
            <div><span class="time-unit" id="days">00</span><span class="time-label">දින</span></div>
            <div><span class="time-unit" id="hours">00</span><span class="time-label">පැය</span></div>
            <div><span class="time-unit" id="mins">00</span><span class="time-label">විනාඩි</span></div>
        </div>
    </div>
</section>

<div id="video" class="section" style="background: #050505;">
    <h2 style="text-align: center; margin-bottom: 40px; font-size: 2rem;">අනුර කුමාර මහතාගේ දේශනය</h2>
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/cxw-9J1SQMg" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<div id="news" class="section">
    <h2 style="text-align: center; font-size: 2rem; margin-bottom: 40px; color: var(--gold);">නවතම පුවත් (Live News)</h2>
    <!-- Google News Widget එක මෙතන තියෙන්නේ -->
    <iframe class="news-frame" src="https://www.bing.com/news/search?q=Anura+Kumara+Dissanayake&qft=sortbydate%3d%221%22&form=NWRFSH" frameborder="0"></iframe>
</div>

<footer style="text-align: center; padding: 50px; background: #000; border-top: 1px solid #222; color: #666;">
    <p>&copy; 2026 NPP Digital Team. Created by Sahiru.</p>
</footer>

<script>
    function openSite() {
        document.getElementById('welcome-screen').classList.add('opened');
        setTimeout(() => { document.getElementById('welcome-screen').style.display = 'none'; }, 1200);
    }

    const targetDate = new Date("September 21, 2029 00:00:00").getTime();
    function updateTimer() {
        const now = new Date().getTime();
        const diff = targetDate - now;
        document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    }
</script>

</body>
</html>
